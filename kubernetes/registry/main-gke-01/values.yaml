argocd-apps:
  cluster: main-gke-01
  server: https://kubernetes.default.svc
  apps:
    - name: azana
      path: backend/k8s
      repoUrl: https://gitlab.com/azana1/flego.git
      namespace: azana
      helmValueFiles:
        - values.yaml
        - current-tag.yaml
    - name: cloudflared
      path: kubernetes/apps/cloudflared
      namespace: cloudflared
      kustomizeEnabled: true
    - name: sealed-secrets
      path: kubernetes/apps/sealed-secrets
      namespace: sealed-secrets
    # - name: gitlab-runner
    #   path: kubernetes/apps/gitlab-runner
    #   namespace: gitlab-runner
    - name: monitoring
      path: kubernetes/apps/monitoring
      namespace: monitoring
  namespaces: []