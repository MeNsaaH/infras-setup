apiVersion: batch/v1
kind: Job
metadata:
  name: grafana-gitlab-sync-setup
  namespace: monitoring
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: configure
          image: curlimages/curl:8.11.1
          env:
            - name: GRAFANA_USER
              valueFrom:
                secretKeyRef:
                  name: grafana-secret
                  key: ADMIN_USER
            - name: GRAFANA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: grafana-secret
                  key: ADMIN_PASSWORD
            - name: GITLAB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: grafana-secret
                  key: GITLAB_TOKEN
          command:
            - sh
            - -c
            - |
              set -e
              GRAFANA_URL="http://grafana.monitoring.svc.cluster.local"
              API_PATH="/apis/provisioning.grafana.com/v0alpha1/namespaces/default/repositories"
              REPO_NAME="grafana-dashboards"

              # Wait for Grafana to be ready
              until curl -sf -u "${GRAFANA_USER}:${GRAFANA_PASSWORD}" \
                "${GRAFANA_URL}/api/health" > /dev/null; do
                echo "Waiting for Grafana..."
                sleep 5
              done

              PAYLOAD=$(printf '{
                "apiVersion": "provisioning.grafana.com/v0alpha1",
                "kind": "Repository",
                "metadata": { "name": "%s" },
                "spec": {
                  "type": "gitlab",
                  "gitlab": {
                    "url": "https://gitlab.com/azana1/flego",
                    "branch": "main",
                    "path": "backend/k8s/dashboards",
                    "token": "%s"
                  },
                  "sync": { "intervalSeconds": 60, "target": "folder" },
                  "workflows": ["write"]
                }
              }' "$REPO_NAME" "$GITLAB_TOKEN")

              STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
                -u "${GRAFANA_USER}:${GRAFANA_PASSWORD}" \
                "${GRAFANA_URL}${API_PATH}/${REPO_NAME}")

              if [ "$STATUS" = "200" ]; then
                echo "Repository exists, updating..."
                curl -sf -X PUT \
                  -H "Content-Type: application/json" \
                  -u "${GRAFANA_USER}:${GRAFANA_PASSWORD}" \
                  "${GRAFANA_URL}${API_PATH}/${REPO_NAME}" \
                  -d "$PAYLOAD"
              else
                echo "Repository not found (HTTP ${STATUS}), creating..."
                curl -sf -X POST \
                  -H "Content-Type: application/json" \
                  -u "${GRAFANA_USER}:${GRAFANA_PASSWORD}" \
                  "${GRAFANA_URL}${API_PATH}" \
                  -d "$PAYLOAD"
              fi

              echo "Done."
